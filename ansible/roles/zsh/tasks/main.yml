
# Zinit plugin manager (replaces zplug)
- name: Check if zinit is installed
  stat:
    path: "{{home}}/.zinit/bin"
  register: zinit_installed

- name: Install zinit plugin manager
  when: not zinit_installed.stat.exists
  git:
    repo: https://github.com/zdharma-continuum/zinit.git
    dest: "{{home}}/.zinit/bin"
    depth: 1

# Clean up old plugin managers
- name: Remove zplug (replaced by zinit)
  file:
    path: "{{home}}/.zplug"
    state: absent

- name: Remove standalone oh-my-zsh (zinit loads OMZ plugins as snippets)
  file:
    path: "{{home}}/.oh-my-zsh"
    state: absent
