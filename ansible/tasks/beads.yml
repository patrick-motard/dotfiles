---
# Ensure beads hooks are installed in repos that use bd

- name: Check if wiki repo exists
  stat:
    path: "{{ ansible_env.HOME }}/code/wiki/.beads"
  register: wiki_beads_dir

- name: Check if bd is available
  command: which bd
  register: bd_available
  changed_when: false
  failed_when: false

- name: Install beads hooks in wiki repo
  tags: [beads, wiki]
  command: bd hooks install
  args:
    chdir: "{{ ansible_env.HOME }}/code/wiki"
  register: bd_hooks_result
  changed_when: "'installed' in bd_hooks_result.stdout"
  failed_when: false
  when: wiki_beads_dir.stat.exists and bd_available.rc == 0
