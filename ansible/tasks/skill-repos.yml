---
# Clone and configure forked skill repos declared in dotfiles-private/skill-repos.json
#
# This task reads the manifest and ensures each repo is:
# 1. Cloned to the specified path
# 2. Has origin set to your fork
# 3. Has upstream set to the original repo (if specified)
# 4. Passes privacy validation (if private: true)

- name: Read skill-repos manifest
  tags: [skill-repos]
  set_fact:
    skill_repos_manifest: "{{ lookup('file', dirs.code + '/dotfiles-private/skill-repos.json') | from_json }}"

- name: Clone forked skill repos
  tags: [skill-repos]
  command: git clone "{{ item.remote }}" "{{ item.path | replace('~', ansible_env.HOME) }}"
  args:
    creates: "{{ item.path | replace('~', ansible_env.HOME) }}"
  loop: "{{ skill_repos_manifest.ownedSkillRepos }}"
  loop_control:
    label: "{{ item.name }}"

- name: Set origin remote for forked skill repos
  tags: [skill-repos]
  command: git remote set-url origin "{{ item.remote }}"
  args:
    chdir: "{{ item.path | replace('~', ansible_env.HOME) }}"
  loop: "{{ skill_repos_manifest.ownedSkillRepos }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false

- name: Set upstream remote for forked skill repos
  tags: [skill-repos]
  shell: |
    if git remote get-url upstream >/dev/null 2>&1; then
      git remote set-url upstream "{{ item.upstream }}"
    else
      git remote add upstream "{{ item.upstream }}"
    fi
  args:
    chdir: "{{ item.path | replace('~', ansible_env.HOME) }}"
  loop: "{{ skill_repos_manifest.ownedSkillRepos | selectattr('upstream', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false

- name: Validate privacy for repos marked private
  tags: [skill-repos]
  shell: |
    repo_name=$(echo "{{ item.remote }}" | sed -E 's|.*github.com[:/](.+)\.git$|\1|')
    is_private=$(gh api "repos/$repo_name" --jq '.private' 2>/dev/null || echo "unknown")
    if [ "$is_private" = "false" ]; then
      echo "ERROR: Repo $repo_name is marked private in skill-repos.json but is PUBLIC on GitHub!"
      echo "Fix with: gh repo edit $repo_name --visibility private"
      exit 1
    fi
  loop: "{{ skill_repos_manifest.ownedSkillRepos | selectattr('private', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
