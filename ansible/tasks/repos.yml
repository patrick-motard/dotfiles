---
# for cloning all my repos to their respective location

- name: Check when git repos were last updated
  stat:
    path: "{{ ansible_env.HOME }}/.ansible-last-git-update"
  register: git_update_timestamp

- name: Determine if git update is needed
  set_fact:
    should_update_git: >-
      {{ force_update | default(false) | bool or
         not git_update_timestamp.stat.exists or
         (ansible_date_time.epoch | int) - (git_update_timestamp.stat.mtime | int) > 86400 }}

- name: Clone dotfiles-private repo
  tags: [repos, dotfiles-private]
  command: gh repo clone patrick-motard/dotfiles-private "{{dirs.code}}/dotfiles-private"
  args:
    creates: "{{dirs.code}}/dotfiles-private"

- name: Remove old scripts repos and symlink
  tags: [cleanup, scripts-cleanup]
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{dirs.code}}/scripts"
    - "{{dirs.code}}/scripts-private"
    - "{{dirs.bin}}/tools"

- name: Remove old scripts repos and symlink
  tags: [cleanup, scripts-cleanup]
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{dirs.code}}/scripts"
    - "{{dirs.code}}/scripts-private"
    - "{{dirs.bin}}/tools"

- name: Remove old Claude plugin repo directories
  tags: [cleanup]
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{dirs.code}}/claude/plugins-public"
    - "{{dirs.code}}/claude/plugins-private"
    - "{{dirs.code}}/claude/plugins-zendesk"
    - "{{ ansible_env.HOME }}/.claude/plugins/marketplaces/pm-public"
    - "{{ ansible_env.HOME }}/.claude/plugins/marketplaces/pm-private"
    - "{{ ansible_env.HOME }}/.claude/plugins/marketplaces/pm-zendesk"
