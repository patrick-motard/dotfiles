---
# Kanata setup for macOS
# - Creates a .app bundle with the kanata binary so macOS can grant Input Monitoring permission
# - Installs a user LaunchAgent that runs kanata via sudo
# - Manages sudoers entry for passwordless sudo

# --- Enable kanata ---

- name: Install kanata sudoers entry
  become: yes
  copy:
    content: "patrick ALL=(root) NOPASSWD: /Applications/Kanata.app/Contents/MacOS/Kanata\n"
    dest: /etc/sudoers.d/kanata
    owner: root
    group: wheel
    mode: '0440'
    validate: visudo -cf %s
  when: kanata_enabled | default(false)

- name: Download kanata binary
  become: yes
  get_url:
    url: https://github.com/jtroo/kanata/releases/download/v1.11.0/macos-binaries-arm64.zip
    dest: /tmp/kanata-macos-arm64.zip
    mode: '0644'
  when: kanata_enabled | default(false)

- name: Create Kanata.app bundle directories
  become: yes
  file:
    path: /Applications/Kanata.app/Contents/MacOS
    state: directory
    mode: '0755'
  when: kanata_enabled | default(false)

- name: Extract kanata binary into Kanata.app bundle
  become: yes
  shell: |
    cd /tmp && unzip -o kanata-macos-arm64.zip kanata_macos_cmd_allowed_arm64
    mv /tmp/kanata_macos_cmd_allowed_arm64 /Applications/Kanata.app/Contents/MacOS/Kanata
    chmod +x /Applications/Kanata.app/Contents/MacOS/Kanata
  args:
    creates: /Applications/Kanata.app/Contents/MacOS/Kanata
  when: kanata_enabled | default(false)

- name: Create Kanata.app Info.plist
  become: yes
  copy:
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
          <key>CFBundleIdentifier</key>
          <string>com.kanata</string>
          <key>CFBundleName</key>
          <string>Kanata</string>
          <key>CFBundleExecutable</key>
          <string>Kanata</string>
          <key>CFBundleVersion</key>
          <string>1.0</string>
          <key>LSUIElement</key>
          <true/>
      </dict>
      </plist>
    dest: /Applications/Kanata.app/Contents/Info.plist
    mode: '0644'
  when: kanata_enabled | default(false)

- name: Install kanata LaunchAgent plist
  copy:
    src: "{{ ansible_env.HOME }}/.config/kanata/com.kanata.plist"
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.kanata.plist"
    mode: '0644'
  register: kanata_plist
  when: kanata_enabled | default(false)

- name: Bootstrap or restart kanata LaunchAgent
  shell: |
    if launchctl print gui/$(id -u)/com.kanata &>/dev/null; then
      launchctl kickstart -k gui/$(id -u)/com.kanata
    else
      launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.kanata.plist
    fi
  when: kanata_enabled | default(false)
  changed_when: false

# --- Disable kanata ---

- name: Remove kanata sudoers entry
  become: yes
  file:
    path: /etc/sudoers.d/kanata
    state: absent
  when: not (kanata_enabled | default(false))

- name: Bootout kanata LaunchAgent
  shell: launchctl bootout gui/$(id -u)/com.kanata 2>/dev/null || true
  when: not (kanata_enabled | default(false))
  changed_when: false

- name: Remove kanata LaunchAgent plist
  file:
    path: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.kanata.plist"
    state: absent
  when: not (kanata_enabled | default(false))

- name: Remove Kanata.app bundle
  become: yes
  file:
    path: /Applications/Kanata.app
    state: absent
  when: not (kanata_enabled | default(false))

- name: Remove old kanata LaunchDaemon plist
  become: yes
  file:
    path: /Library/LaunchDaemons/com.kanata.plist
    state: absent
  when: not (kanata_enabled | default(false))

- name: Bootout old kanata LaunchDaemon if present
  become: yes
  shell: launchctl bootout system/com.kanata 2>/dev/null || true
  when: not (kanata_enabled | default(false))
  changed_when: false

- name: Remove old kanata binary from /usr/local/bin
  become: yes
  file:
    path: /usr/local/bin/kanata_cmd
    state: absent
  when: not (kanata_enabled | default(false))
