# Everforest Hard
set -g status-style "bg=#2e383e,fg=#d3c6aa"

set -g status-left "#{tmux_mode_indicator}#{?window_zoomed_flag, #[fg=#2e383e]#[bg=#dbbc7f]#[bold] ZOOM #[default],} #[fg=#3d484d]█#[fg=#d3c6aa,bg=#3d484d] #S #[fg=#3d484d,bg=#2e383e]█#[default] "
set -g status-right " #[fg=#3d484d]█#[fg=#d3c6aa,bg=#3d484d]  #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') #[fg=#475258]█#[fg=#d3c6aa,bg=#475258] #($HOME/code/scripts-private/bin/system-state-check --tmux) #[fg=#a7c080]█#[fg=#272e33,bg=#a7c080,bold] %l:%M%p "

set -g window-status-format "#[fg=#3d484d,bg=#2e383e]█#[fg=#d3c6aa,bg=#3d484d] #I:#W #[bg=#2e383e]#[fg=#3d484d]█"
set -g window-status-current-format "#[fg=#a7c080,bg=#2e383e]█#[fg=#272e33,bg=#a7c080,bold] #I:#W #[bg=#2e383e]#[fg=#a7c080]█"

set -g pane-border-style 'fg=#3d484d'
set -g pane-active-border-style 'fg=#a7c080,bold'
set -g mode-style 'bg=#3d484d,fg=#d3c6aa,bold'
set -g window-style 'bg=#272e33'
set -g window-active-style 'bg=#272e33'
set -g popup-style 'bg=#272e33'
set -g popup-border-style 'bg=#272e33,fg=#475258'
set -g @theme_copy_mode_bg 'bg=#1e2529'
