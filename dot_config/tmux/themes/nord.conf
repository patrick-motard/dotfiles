# Nord
set -g status-style "bg=#3b4252,fg=#d8dee9"

set -g status-left "#{tmux_mode_indicator}#{?window_zoomed_flag, #[fg=#3b4252]#[bg=#ebcb8b]#[bold] ZOOM #[default],} #[fg=#434c5e]█#[fg=#d8dee9,bg=#434c5e] #S #[fg=#434c5e,bg=#3b4252]█#[default] "
set -g status-right " #[fg=#434c5e]█#[fg=#d8dee9,bg=#434c5e]  #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') #[fg=#4c566a]█#[fg=#d8dee9,bg=#4c566a] #($HOME/code/scripts-private/bin/system-state-check --tmux) #[fg=#88c0d0]█#[fg=#2e3440,bg=#88c0d0,bold] %l:%M%p "

set -g window-status-format "#[fg=#434c5e,bg=#3b4252]█#[fg=#d8dee9,bg=#434c5e] #I:#W #[bg=#3b4252]#[fg=#434c5e]█"
set -g window-status-current-format "#[fg=#88c0d0,bg=#3b4252]█#[fg=#2e3440,bg=#88c0d0,bold] #I:#W #[bg=#3b4252]#[fg=#88c0d0]█"

set -g pane-border-style 'fg=#434c5e'
set -g pane-active-border-style 'fg=#88c0d0,bold'
set -g mode-style 'bg=#434c5e,fg=#eceff4,bold'
set -g window-style 'bg=#2e3440'
set -g window-active-style 'bg=#2e3440'
set -g popup-style 'bg=#2e3440'
set -g popup-border-style 'bg=#2e3440,fg=#4c566a'
set -g @theme_copy_mode_bg 'bg=#242831'
