---
git:
  # Respect global pull.rebase=true so pulls rebase local commits instead of
  # merging. Prevents lazygit's default 'merge' mode from clobbering local work
  # when local and remote have diverged.
  pull:
    mode: 'rebase'
os:
  editPreset: 'nvim-remote'
  editTemplate: '[ -z "$NVIM" ] && nvim -- {{filename}} || nvim --server "$NVIM" --remote {{filename}}'
  editAtLineTemplate: '[ -z "$NVIM" ] && nvim +{{line}} -- {{filename}} || (nvim --server "$NVIM" --remote {{filename}} && nvim --server "$NVIM" --remote-send ":{{line}}<CR>")'
